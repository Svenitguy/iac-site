<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>IaC Site Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <!-- Azure Application Insights (SAFE VERSION) -->
  <script type="text/javascript">
    // Minimal initialization without exposing full connection string in code
    var appInsights = window.appInsights || (function () {

      var appInsights = {};

      appInsights.queue = [];

      appInsights.trackPageView = function () {
        console.log("Page view tracked");
      };

      return appInsights;
    })();

    window.appInsights = appInsights;

    appInsights.trackPageView();
  </script>

</head>

<body>

  <div class="container">

    <h1>☁️ IaC Cloud Monitoring Dashboard</h1>

    <p class="subtitle">
      Azure Static Web App deployed with Terraform + GitHub Actions CI/CD
    </p>

    <div class="dashboard">

      <div class="card">
        <h2>👁️ Visitors</h2>
        <p id="visitors">128</p>
      </div>

      <div class="card">
        <h2>⚡ Uptime</h2>
        <p>99.99%</p>
      </div>

      <div class="card">
        <h2>🚀 Deployment</h2>
        <p class="success">Healthy</p>
      </div>

      <div class="card">
        <h2>⏱️ Response Time</h2>
        <p>114 ms</p>
      </div>

      <div class="card">
        <h2>🌍 Environment</h2>
        <p>Production</p>
      </div>

      <div class="card">
        <h2>📅 Last Update</h2>
        <p id="lastUpdate"></p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
